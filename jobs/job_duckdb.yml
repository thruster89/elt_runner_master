# ============================================================
# job_duckdb.yml
# source: Oracle → export CSV → load DuckDB
#         → transform(DuckDB) → report(target DuckDB → CSV + Excel)
# ============================================================

job_name: job_duckdb

params:
  clsYymm: "202003"

pipeline:
  stages:
    - export
    - load_local
    - transform
    - report

# ── 소스 DB ──────────────────────────────────────────────────
source:
  type: oracle
  host: local

# ── Export ───────────────────────────────────────────────────
export:
  # sql_dir: sql/export
  out_dir: data/export
  format: csv
  compression: gzip
  overwrite: true
  parallel_workers: 1

# ── Target ───────────────────────────────────────────────────
target:
  type: duckdb
  db_path: data/local/result.duckdb
  # schema: MY_SCHEMA       # 선택: 스키마 지정

# ── Transform ────────────────────────────────────────────────
transform:
  sql_dir: sql/transform/duckdb    # DuckDB 전용 SQL 디렉토리
  on_error: stop

# ── Report ───────────────────────────────────────────────────
report:
  source: target             # load된 DuckDB에서 리포트 쿼리 실행

  export_csv:
    enabled: true
    sql_dir: sql/report
    out_dir: data/report
    compression: none

  # export_views:              # DB view → SELECT * → CSV 추출
  #   enabled: true
  #   views: all               # all(schema 내 전체) | [VIEW_A, VIEW_B]
  #   out_dir: data/report
  #   compression: none
  #   max_rows: 200000         # 행 수 제한 (0=무제한, 기본=200000)
  #   warn_rows: 100000        # 초과 시 WARNING (기본=100000)

  excel:
    enabled: true
    out_dir: data/report
    max_files: 10
