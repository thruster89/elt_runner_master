job_name: default
pipeline:
  stages:
  - export
  - load_local
  - transform
  - report
source:
  type: oracle
  host: local
export:
  sql_dir: sql/export
  out_dir: data/export
  overwrite: false
  parallel_workers: 1
  compression: gzip
  csv_name_style: full
  csv_strip_prefix: false
  format: csv
load:
  mode: replace
target:
  type: duckdb
  db_path: data/local/result.duckdb
transform:
  sql_dir: sql/transform/duckdb
  on_error: stop
report:
  source: target
  export_csv:
    enabled: true
    sql_dir: sql/report
    out_dir: data/report
  excel:
    enabled: true
    out_dir: data/report
    max_files: 10
  csv_union_dir: data/report
