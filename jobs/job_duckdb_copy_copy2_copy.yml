job_name: job_duckdb
pipeline:
  stages:
  - load_local
source:
  type: vertica
  host: pdwvdbs
export:
  sql_dir: sql/export
  out_dir: data/export
  overwrite: true
  parallel_workers: 1
  compression: gzip
  format: csv
load:
  mode: truncate
target:
  type: oracle
transform:
  sql_dir: sql/transform/oracle
  on_error: stop
  schema: sdasd
report:
  source: target
  export_csv:
    enabled: true
    sql_dir: sql/report
    out_dir: data/report
  excel:
    enabled: true
    out_dir: data/report
    max_files: 10
params:
  clsYymm: '202003'
