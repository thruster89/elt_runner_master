job_name: job_duckdb
pipeline:
  stages:
  - export
  - load_local
  - transform
  - report
source:
  type: vertica
  host: pdwvdbs
export:
  sql_dir: sql/export
  out_dir: data/export
  overwrite: true
  parallel_workers: 1
  compression: gzip
  format: csv
load:
  mode: replace
target:
  type: sqlite3
  db_path: data/local/result.duckdb
transform:
  sql_dir: sql/transform/sqlite3
  on_error: stop
report:
  source: target
  export_csv:
    enabled: true
    sql_dir: sql/report
    out_dir: data/report
  excel:
    enabled: true
    out_dir: data/report
    max_files: 10
params:
  clsYymm: '202003'
